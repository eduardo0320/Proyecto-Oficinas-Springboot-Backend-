spring.application.name=backend
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080

#Habilitar swagger ui
springdoc.swagger-ui.enabled=true

#ruta personalizada para swagger ui
springdoc.swagger-ui.path=/swagger-ui.html

# JWT: el secreto sale de una variable de entorno, NUNCA del codigo fuente
app.jwt.secret=${JWT_SECRET:03200320032003200320032003200320}
app.jwt.expiration-ms=3600000

# Contrasenas semilla de desarrollo, tambien por variable de entorno
app.seed.admin-password=${SEED_ADMIN_PASSWORD:changeit}
app.seed.registrador-password=${SEED_REGISTRADOR_PASSWORD:changeit}
app.seed.visor-password=${SEED_VISOR_PASSWORD:changeit}

